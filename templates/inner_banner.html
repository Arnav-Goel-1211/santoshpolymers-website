<!-- Unified Inner Page Banner -->
<section class="page-banner unified-banner" style="background-image: linear-gradient(135deg, rgba(3, 82, 23, 0.96) 0%, rgba(12, 53, 21, 0.92) 100%), url('{{banner_bg_image}}');">
  <div class="container">
    <div class="reveal">
      <div class="breadcrumbs">
        {{banner_breadcrumbs}}
      </div>
      <span class="banner-eyebrow">{{banner_eyebrow}}</span>
      <h1>{{banner_title}}</h1>
      <p class="banner-description">{{banner_description}}</p>
      
      {{banner_stats_html}}
    </div>
  </div>
</section>
