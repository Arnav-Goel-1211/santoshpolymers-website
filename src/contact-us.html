<!-- Contact Detail Grid -->
<section class="section">
  <div class="container contact-grid">
    
    <!-- Info Cards -->
    <div class="contact-info-cards">
      
      <div class="contact-card reveal-left delay-1">
        <div class="contact-card-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        </div>
        <div>
          <h3>Office Location</h3>
          <p>Vill. Gharaula, Ladwa Kurukshetra,<br>Haryana, India - 136132</p>
        </div>
      </div>
      
      <div class="contact-card reveal-left delay-2">
        <div class="contact-card-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        </div>
        <div>
          <h3>Office Hours</h3>
          <p>Monday - Friday: 08:00 AM to 08:00 PM<br>Saturday - Sunday: Closed</p>
        </div>
      </div>
      
      <div class="contact-card reveal-left delay-3">
        <div class="contact-card-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        </div>
        <div>
          <h3>Quick Contact</h3>
          <p><strong>Phone:</strong> +91 92156 60695<br><strong>Email:</strong> santoshpolymers.info@gmail.com</p>
        </div>
      </div>
      
    </div>
    
    <!-- Contact Form -->
    <div class="contact-form-box reveal-right">
      <h2 style="font-size: 24px; margin-bottom: 24px; color: var(--primary-color);">Get In Touch</h2>
      <form id="contactForm" method="POST" action="/api/send-email">
        
        <div class="form-group hp-field">
          <label for="website">Leave this blank if you are human</label>
          <input type="text" name="website" id="website" class="form-control" autocomplete="off">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="name">Your Name *</label>
            <input type="text" name="name" id="name" class="form-control" required placeholder="Enter name">
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" name="phone" id="phone" class="form-control" placeholder="Enter number">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" name="email" id="email" class="form-control" required placeholder="Enter email">
          </div>
          <div class="form-group">
            <label for="company">Company Name</label>
            <input type="text" name="company" id="company" class="form-control" placeholder="Enter company name">
          </div>
        </div>
        
        <div class="form-group">
          <label for="message">Message *</label>
          <textarea name="message" id="message" class="form-control" required placeholder="Describe your product requirements..."></textarea>
        </div>
        
        <div style="text-align: right;">
          <button type="submit" class="btn btn-primary">Submit Enquiry</button>
        </div>
        
      </form>
    </div>
    
  </div>
  
  <!-- Google Map -->
  <div class="container google-map">

            width="100%" height="450" allowfullscreen="" loading="lazy"></iframe>
  </div>
  
</section>
